spring.application.name=ssms
spring.flyway.enabled=false

spring.datasource.url=jdbc:mysql://localhost:3306/ssms_api?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mvc.throw-exception-if-no-handler-found=true
# Disable the default resource handling so it doesn't try to look for a "static file" 404
spring.web.resources.add-mappings=false

# Tell Flyway to 'baseline' an existing database
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=none